components:
    schemas:
        registeruserrequest:
            title: registeruserrequest
            required:
                - name
                - email
                - password
            type: object
            properties:
                name:
                    type: string
                email:
                    type: string
                password:
                    type: string
            example:
                name: Yacov
                email: yacov2@gmail.com
                password: secret
        LoginRequest:
            title: LoginRequest
            required:
                - email
                - password
            type: object
            properties:
                email:
                    type: string
                password:
                    type: string
            example:
                email: yacov1@gmail.com
                password: secret
        CreateJobRequest:
            title: CreateJobRequest
            required:
